<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout – Pretty Store</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="user.css" />
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <a href="index.html" class="header-logo">💕 Pretty Store</a>
    <div style="flex:1;font-family:var(--font-heading);font-size:18px;font-weight:700">Checkout</div>
  </div>
</header>

<main class="page-container page-bottom-padding" style="margin-top:20px">
  <div id="checkout-loading" class="flex-center" style="padding:60px"><div class="spinner"></div></div>

  <div id="checkout-content" style="display:none" class="checkout-layout">
    <!-- Left: Address + Payment -->
    <div>
      <!-- Delivery Address -->
      <div class="checkout-section">
        <h3>📍 Delivery Address</h3>

        <!-- Saved addresses -->
        <div id="saved-addresses"></div>

        <!-- New address form toggle -->
        <button class="btn btn-outline" id="add-new-addr-btn" style="margin-bottom:16px;font-size:13px">
          + Add New Address
        </button>

        <div id="new-addr-form" style="display:none">
          <div class="form-grid">
            <div class="form-group">
              <label>Full Name *</label>
              <input type="text" id="addr-name" class="form-control" placeholder="Your full name" required />
            </div>
            <div class="form-group">
              <label>Phone *</label>
              <input type="tel" id="addr-phone" class="form-control" placeholder="10-digit number" required />
            </div>
            <div class="form-group full">
              <label>Street / House / Flat No. *</label>
              <input type="text" id="addr-street" class="form-control" placeholder="House no., Street, Area" required />
            </div>
            <div class="form-group">
              <label>Pincode *</label>
              <input type="text" id="addr-pincode" class="form-control" placeholder="400001" maxlength="6" required />
            </div>
            <div class="form-group">
              <label>City *</label>
              <input type="text" id="addr-city" class="form-control" placeholder="Mumbai" required />
            </div>
            <div class="form-group">
              <label>State *</label>
              <select id="addr-state" class="form-control" required>
                <option value="">Select State</option>
              <option>Andhra Pradesh</option>
              <option>Arunachal Pradesh</option>
              <option>Assam</option>
              <option>Bihar</option>
              <option>Chhattisgarh</option>
              <option>Delhi</option>
              <option>Goa</option>
              <option>Gujarat</option>
              <option>Haryana</option>
              <option>Himachal Pradesh</option>
              <option>Himachal Pradesh</option>
              <option>Jammu &amp; Kashmir</option>
              <option>Jharkhand</option>
              <option>Karnataka</option>
              <option>Kerala</option>
              <option>Ladakh</option>
              <option>Madhya Pradesh</option>
              <option>Maharashtra</option>
              <option>Manipur</option>
              <option>Meghalaya</option>
              <option>Mizoram</option>
              <option>Nagaland</option>
              <option>Odisha</option>
              <option>Puducherry</option>
              <option>Punjab</option>
              <option>Rajasthan</option>
              <option>Sikkim</option>
              <option>Tamil Nadu</option>
              <option>Telangana</option>
              <option>Tripura</option>
              <option>Uttar Pradesh</option>
              <option>Uttarakhand</option>
              <option>West Bengal</option>
              </select>
            </div>
          </div>
          <button class="btn btn-primary" id="use-this-addr-btn">Use This Address</button>
        </div>
      </div>

      <!-- Payment Method -->
      <div class="checkout-section">
        <h3>💳 Payment Method</h3>
        <div class="payment-options" id="payment-options">
          <div class="flex-center" style="padding:20px"><div class="spinner"></div></div>
        </div>
      </div>
    </div>

    <!-- Right: Order Summary -->
    <div>
      <div class="order-summary" style="position:sticky;top:80px">
        <h3>Order Summary</h3>
        <div id="checkout-items" style="margin-bottom:16px;max-height:300px;overflow-y:auto"></div>
        <div class="summary-row"><span>Subtotal</span><span id="cs-subtotal">—</span></div>
        <div class="summary-row"><span>Shipping</span><span id="cs-shipping">—</span></div>
        <div class="summary-row total"><span>Total</span><span id="cs-total">—</span></div>
        <button class="btn btn-primary btn-full btn-lg" id="place-order-btn" style="margin-top:20px">
          Place Order 🎉
        </button>
        <p style="font-size:11px;color:var(--text-muted);text-align:center;margin-top:8px">🔒 Secured by 256-bit SSL</p>
      </div>
    </div>
  </div>
</main>

<div id="toast-container"></div>
<script src="../assets/js/utils.js"></script>
<script>
  if (!auth.isLoggedIn()) window.location.href = 'login.html?redirect=checkout.html';

  let cart = null;
  let selectedAddress = null;
  let selectedPayment = null;
  let userData = null;

  async function init() {
    try {
      const [cartRes, profileRes, methodsRes] = await Promise.all([
        api.get('/cart'),
        api.get('/users/profile'),
        api.get('/auth/payment-methods')
      ]);
      cart = cartRes.cart;
      userData = profileRes.user;
      savedAddressesRef = userData.addresses || [];

      if (!cart.items.length) { location.href = 'cart.html'; return; }

      document.getElementById('checkout-loading').style.display = 'none';
      document.getElementById('checkout-content').style.display = 'grid';

      renderSummary();
      renderAddresses(userData.addresses || []);
      renderPaymentMethods(methodsRes.methods);
    } catch (err) {
      showToast(err.message, 'error');
    }
  }

  function renderSummary() {
    const subtotal = cart.subtotal;
    const shipping = subtotal >= 499 ? 0 : 49;
    const total = subtotal + shipping;

    document.getElementById('cs-subtotal').textContent = formatPrice(subtotal);
    document.getElementById('cs-shipping').textContent = shipping === 0 ? 'FREE 🎉' : formatPrice(shipping);
    document.getElementById('cs-total').textContent = formatPrice(total);

    document.getElementById('checkout-items').innerHTML = cart.items.map(item => `
      <div style="display:flex;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
        <img src="${item.product.images[0]?.url||''}" style="width:44px;height:44px;object-fit:cover;border-radius:6px;flex-shrink:0" onerror="imgFallback(this)" />
        <div style="flex:1;font-size:13px">
          <div style="font-weight:700;line-height:1.3">${item.product.title}</div>
          <div style="color:var(--text-muted)">Qty: ${item.quantity}</div>
        </div>
        <div style="font-weight:800;font-size:13px">${formatPrice(item.product.price * item.quantity)}</div>
      </div>`).join('');
  }

  function renderAddresses(addresses) {
    const savedDiv = document.getElementById('saved-addresses');
    if (!addresses.length) {
      savedDiv.innerHTML = '';
      document.getElementById('new-addr-form').style.display = 'block';
      document.getElementById('add-new-addr-btn').style.display = 'none';
      return;
    }

    if (!selectedAddress && addresses.length) {
      selectedAddress = addresses[0];
    }

    savedDiv.innerHTML = addresses.map((a, i) => {
      const isSelected = selectedAddress && (selectedAddress._id === a._id || (!selectedAddress._id && i === 0));
      return `<div class="address-card ${isSelected ? 'default' : ''}"
           data-index="${i}"
           onclick="selectAddressByIndex(${i})"
           style="cursor:pointer;margin-bottom:10px">
        <div style="display:flex;align-items:flex-start;justify-content:space-between">
          <div>
            <p class="font-bold">${a.name} <span style="font-size:12px;color:var(--text-muted)">📞 ${a.phone}</span></p>
            <p style="font-size:13px;color:var(--text-muted);margin-top:3px">${a.street}, ${a.city}, ${a.state} – ${a.pincode}</p>
          </div>
          <span style="font-size:18px">${isSelected ? '✅' : '⭕'}</span>
        </div>
      </div>`;
    }).join('');
  }

  // Store addresses globally so selectAddressByIndex can look them up
  let savedAddressesRef = [];

  function selectAddressByIndex(i) {
    selectedAddress = savedAddressesRef[i];
    renderAddresses(savedAddressesRef);
  }

  document.getElementById('add-new-addr-btn').addEventListener('click', () => {
    document.getElementById('new-addr-form').style.display = 'block';
    document.getElementById('add-new-addr-btn').style.display = 'none';
  });

  document.getElementById('use-this-addr-btn').addEventListener('click', async () => {
    const name = document.getElementById('addr-name').value.trim();
    const phone = document.getElementById('addr-phone').value.trim();
    const street = document.getElementById('addr-street').value.trim();
    const pincode = document.getElementById('addr-pincode').value.trim();
    const city = document.getElementById('addr-city').value.trim();
    const state = document.getElementById('addr-state').value;
    if (!name || !phone || !street || !pincode || !city || !state) {
      showToast('Please fill all address fields', 'warning'); return;
    }
    try {
      const data = await api.post('/users/address', { name, phone, street, pincode, city, state });
      savedAddressesRef = data.addresses;
      selectedAddress = data.addresses[data.addresses.length - 1];
      showToast('Address saved!', 'success');
      document.getElementById('new-addr-form').style.display = 'none';
      document.getElementById('add-new-addr-btn').style.display = 'block';
      renderAddresses(data.addresses);
    } catch (err) { showToast(err.message, 'error'); }
  });

  function renderPaymentMethods(methods) {
    const icons = { UPI: '📱', COD: '💵', Card: '💳', NetBanking: '🏦' };
    const desc = { UPI: 'GPay, PhonePe, Paytm & more', COD: 'Pay when delivered', Card: 'Debit/Credit cards', NetBanking: 'All major banks' };
    const enabled = Object.entries(methods).filter(([,v]) => v);
    if (!enabled.length) {
      document.getElementById('payment-options').innerHTML = '<p class="text-muted" style="font-size:14px">No payment methods available. Contact support.</p>';
      return;
    }
    document.getElementById('payment-options').innerHTML = enabled.map(([key]) => `
      <label class="payment-option" onclick="selectPayment('${key}', this)">
        <input type="radio" name="payment" value="${key}" />
        <span class="p-icon">${icons[key]||'💰'}</span>
        <div>
          <div class="p-label">${key}</div>
          <div class="p-desc">${desc[key]||''}</div>
        </div>
      </label>`).join('');

    // Select first by default
    const firstOpt = document.querySelector('.payment-option');
    if (firstOpt) { firstOpt.click(); }
  }

  function selectPayment(method, el) {
    selectedPayment = method;
    document.querySelectorAll('.payment-option').forEach(o => o.classList.remove('active'));
    el.classList.add('active');
    el.querySelector('input').checked = true;
  }

  // Place order
  document.getElementById('place-order-btn').addEventListener('click', async () => {
    if (!selectedAddress) { showToast('Please select a delivery address', 'warning'); return; }
    if (!selectedPayment) { showToast('Please select a payment method', 'warning'); return; }

    const btn = document.getElementById('place-order-btn');
    btn.disabled = true; btn.innerHTML = '<div class="spinner spinner-sm"></div> Processing...';

    try {
      if (selectedPayment === 'COD') {
        await placeOrderCOD();
      } else {
        await placeOrderRazorpay();
      }
    } catch (err) {
      showToast(err.message, 'error');
      btn.disabled = false; btn.textContent = 'Place Order 🎉';
    }
  });

  async function placeOrderCOD() {
    const data = await api.post('/orders', {
      shippingAddress: selectedAddress,
      paymentMethod: 'COD'
    });
    showToast('Order placed successfully! 🎉', 'success');
    setTimeout(() => location.href = `orders.html`, 1000);
  }

  async function placeOrderRazorpay() {
    const subtotal = cart.subtotal;
    const shipping = subtotal >= 499 ? 0 : 49;
    const total = (subtotal + shipping) * 100; // paise

    const orderRes = await api.post('/payment/create-order', { amount: total });
    const user = auth.getUser();

    const options = {
      key: orderRes.key,
      amount: total,
      currency: 'INR',
      name: 'Pretty Store',
      description: 'Order Payment',
      order_id: orderRes.order.id,
      prefill: { name: user?.name || '', contact: user?.phone || '' },
      theme: { color: '#f43397' },
      handler: async (response) => {
        try {
          await api.post('/payment/verify', {
            razorpay_order_id: response.razorpay_order_id,
            razorpay_payment_id: response.razorpay_payment_id,
            razorpay_signature: response.razorpay_signature
          });
          await api.post('/orders', {
            shippingAddress: selectedAddress,
            paymentMethod: selectedPayment,
            razorpayOrderId: response.razorpay_order_id,
            razorpayPaymentId: response.razorpay_payment_id
          });
          showToast('Payment successful! Order placed 🎉', 'success');
          setTimeout(() => location.href = 'orders.html', 1000);
        } catch (err) {
          showToast('Payment verification failed: ' + err.message, 'error');
        }
      },
      modal: {
        ondismiss: () => {
          const btn = document.getElementById('place-order-btn');
          btn.disabled = false; btn.textContent = 'Place Order 🎉';
        }
      }
    };

    const rzp = new Razorpay(options);
    rzp.open();
  }

  init();
</script>
</body>
</html>
