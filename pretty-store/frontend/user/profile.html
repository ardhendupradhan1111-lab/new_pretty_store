<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile – Pretty Store</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="user.css" />
</head>
<body>
<header class="header">
  <div class="header-inner">
    <a href="index.html" class="header-logo">💕 Pretty Store</a>
    <div style="flex:1;font-family:var(--font-heading);font-size:18px;font-weight:700">My Profile</div>
    <button class="header-btn" onclick="location.href='cart.html'" style="position:relative">
      <span class="icon">🛒</span>
      <span class="cart-badge cart-count" style="display:none">0</span>
    </button>
  </div>
</header>

<main class="page-container page-bottom-padding" style="margin-top:20px;max-width:700px">
  <div id="profile-loading" class="flex-center" style="padding:60px"><div class="spinner"></div></div>
  <div id="profile-content" style="display:none">

    <!-- Avatar & Info -->
    <div class="card" style="padding:24px;text-align:center;margin-bottom:16px">
      <div class="profile-avatar" id="profile-avatar">?</div>
      <h2 id="profile-name" style="font-family:var(--font-heading);font-size:20px;margin-bottom:4px"></h2>
      <p id="profile-phone" style="color:var(--text-muted);font-size:14px"></p>
      <div style="display:flex;justify-content:center;gap:20px;margin-top:16px">
        <a href="orders.html" style="text-align:center;color:var(--text-muted);font-size:13px;font-weight:700">
          <div style="font-size:24px">📦</div>My Orders
        </a>
        <a href="wishlist.html" style="text-align:center;color:var(--text-muted);font-size:13px;font-weight:700">
          <div style="font-size:24px">❤️</div>Wishlist
        </a>
        <div style="text-align:center;color:var(--text-muted);font-size:13px;font-weight:700;cursor:pointer" onclick="scrollToAddresses()">
          <div style="font-size:24px">📍</div>Addresses
        </div>
      </div>
    </div>

    <!-- Edit Profile -->
    <div class="card" style="padding:24px;margin-bottom:16px">
      <h3 style="font-family:var(--font-heading);font-size:17px;margin-bottom:16px">✏️ Edit Profile</h3>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="edit-name" class="form-control" placeholder="Your name" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="edit-email" class="form-control" placeholder="your@email.com" />
      </div>
      <div class="form-group">
        <label>Mobile Number</label>
        <input type="text" id="edit-phone" class="form-control" readonly style="background:var(--bg);color:var(--text-muted)" />
        <span style="font-size:12px;color:var(--text-muted)">Phone number cannot be changed</span>
      </div>
      <button class="btn btn-primary" id="save-profile-btn">Save Changes</button>
    </div>

    <!-- Addresses -->
    <div class="card" style="padding:24px;margin-bottom:16px" id="addresses-section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <h3 style="font-family:var(--font-heading);font-size:17px">📍 Saved Addresses</h3>
        <button class="btn btn-outline btn-sm" id="add-addr-btn">+ Add New</button>
      </div>
      <div id="addresses-list"></div>
    </div>

    <!-- Logout -->
    <button class="btn btn-full" id="logout-btn" style="background:#fff;border:2px solid var(--error);color:var(--error);font-weight:700;padding:14px;border-radius:var(--radius);margin-bottom:16px">
      🚪 Logout
    </button>
  </div>
</main>

<!-- Add Address Modal -->
<div class="modal-overlay" id="addr-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="addr-modal-title">Add Address</h3>
      <button class="modal-close" onclick="closeAddrModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-addr-id" />
      <div class="form-grid">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="m-name" class="form-control" required />
        </div>
        <div class="form-group">
          <label>Phone *</label>
          <input type="tel" id="m-phone" class="form-control" required />
        </div>
        <div class="form-group full">
          <label>Street / House No. *</label>
          <input type="text" id="m-street" class="form-control" required />
        </div>
        <div class="form-group">
          <label>Pincode *</label>
          <input type="text" id="m-pincode" class="form-control" maxlength="6" required />
        </div>
        <div class="form-group">
          <label>City *</label>
          <input type="text" id="m-city" class="form-control" required />
        </div>
        <div class="form-group full">
          <label>State *</label>
          <select id="m-state" class="form-control" required>
            <option value="">Select State</option>
            <option>Andhra Pradesh</option>
            <option>Arunachal Pradesh</option>
            <option>Assam</option>
            <option>Bihar</option>
            <option>Chhattisgarh</option>
            <option>Delhi</option>
            <option>Goa</option>
            <option>Gujarat</option>
            <option>Haryana</option>
            <option>Himachal Pradesh</option>
            <option>Jammu &amp; Kashmir</option>
            <option>Jharkhand</option>
            <option>Karnataka</option>
            <option>Kerala</option>
            <option>Ladakh</option>
            <option>Madhya Pradesh</option>
            <option>Maharashtra</option>
            <option>Manipur</option>
            <option>Meghalaya</option>
            <option>Mizoram</option>
            <option>Nagaland</option>
            <option>Odisha</option>
            <option>Puducherry</option>
            <option>Punjab</option>
            <option>Rajasthan</option>
            <option>Sikkim</option>
            <option>Tamil Nadu</option>
            <option>Telangana</option>
            <option>Tripura</option>
            <option>Uttar Pradesh</option>
            <option>Uttarakhand</option>
            <option>West Bengal</option>
          </select>
        </div>
        <div class="form-group full">
          <label class="filter-check"><input type="checkbox" id="m-default" /> Set as default address</label>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeAddrModal()">Cancel</button>
      <button class="btn btn-primary" id="save-addr-btn">Save Address</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="index.html"><span class="bnav-icon">🏠</span>Home</a>
  <a href="wishlist.html"><span class="bnav-icon">❤️</span>Wishlist</a>
  <a href="cart.html" style="position:relative"><span class="bnav-icon">🛒</span>Cart
    <span class="cart-badge cart-count" style="top:0;right:20%;display:none">0</span>
  </a>
  <a href="orders.html"><span class="bnav-icon">📦</span>Orders</a>
  <a href="profile.html" class="active"><span class="bnav-icon">👤</span>Profile</a>
</nav>

<div id="toast-container"></div>
<script src="../assets/js/utils.js"></script>
<script>
  if (!auth.isLoggedIn()) window.location.href = 'login.html?redirect=profile.html';

  let userData = null;
  let editingAddrId = null;

  async function loadProfile() {
    try {
      const data = await api.get('/users/profile');
      userData = data.user;
      document.getElementById('profile-loading').style.display = 'none';
      document.getElementById('profile-content').style.display = 'block';
      renderProfile(data.user);
      refreshCartCount();
    } catch (err) {
      showToast(err.message, 'error');
    }
  }

  function renderProfile(user) {
    const initials = (user.name || user.phone)[0].toUpperCase();
    document.getElementById('profile-avatar').textContent = initials;
    document.getElementById('profile-name').textContent = user.name || 'User';
    document.getElementById('profile-phone').textContent = '+91 ' + user.phone;
    document.getElementById('edit-name').value = user.name || '';
    document.getElementById('edit-email').value = user.email || '';
    document.getElementById('edit-phone').value = user.phone;
    renderAddresses(user.addresses || []);
  }

  function renderAddresses(addresses) {
    const el = document.getElementById('addresses-list');
    if (!addresses.length) {
      el.innerHTML = '<p class="text-muted" style="font-size:14px">No saved addresses.</p>';
      return;
    }
    el.innerHTML = addresses.map(a => `
      <div class="address-card ${a.isDefault ? 'default' : ''}">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">
          <div style="font-size:14px">
            <p class="font-bold">${a.name} ${a.isDefault ? '<span class="badge badge-primary" style="font-size:10px;margin-left:4px">Default</span>' : ''}</p>
            <p class="text-muted" style="margin-top:2px">📞 ${a.phone}</p>
            <p class="text-muted" style="margin-top:2px">${a.street}, ${a.city}, ${a.state} – ${a.pincode}</p>
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0">
            <button class="action-btn edit" style="font-size:11px" onclick="editAddress('${a._id}')">✏️</button>
            <button class="action-btn delete" style="font-size:11px" onclick="deleteAddress('${a._id}')">🗑️</button>
          </div>
        </div>
      </div>`).join('');
  }

  // Save profile
  document.getElementById('save-profile-btn').addEventListener('click', async () => {
    const name = document.getElementById('edit-name').value.trim();
    const email = document.getElementById('edit-email').value.trim();
    const btn = document.getElementById('save-profile-btn');
    btn.disabled = true; btn.innerHTML = '<div class="spinner spinner-sm"></div>';
    try {
      await api.put('/users/profile', { name, email });
      auth.setUser({ ...auth.getUser(), name, email });
      showToast('Profile updated!', 'success');
      document.getElementById('profile-name').textContent = name || 'User';
      document.getElementById('profile-avatar').textContent = (name || userData.phone)[0].toUpperCase();
    } catch (err) { showToast(err.message, 'error'); }
    finally { btn.disabled = false; btn.textContent = 'Save Changes'; }
  });

  // Address modal
  document.getElementById('add-addr-btn').addEventListener('click', () => {
    editingAddrId = null;
    document.getElementById('addr-modal-title').textContent = 'Add Address';
    ['m-name','m-phone','m-street','m-pincode','m-city'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('m-state').value = '';
    document.getElementById('m-default').checked = false;
    document.getElementById('addr-modal').classList.add('active');
  });

  function editAddress(id) {
    editingAddrId = id;
    const addr = userData.addresses.find(a => a._id === id);
    if (!addr) return;
    document.getElementById('addr-modal-title').textContent = 'Edit Address';
    document.getElementById('m-name').value = addr.name;
    document.getElementById('m-phone').value = addr.phone;
    document.getElementById('m-street').value = addr.street;
    document.getElementById('m-pincode').value = addr.pincode;
    document.getElementById('m-city').value = addr.city;
    document.getElementById('m-state').value = addr.state;
    document.getElementById('m-default').checked = addr.isDefault;
    document.getElementById('addr-modal').classList.add('active');
  }

  document.getElementById('save-addr-btn').addEventListener('click', async () => {
    const payload = {
      name: document.getElementById('m-name').value.trim(),
      phone: document.getElementById('m-phone').value.trim(),
      street: document.getElementById('m-street').value.trim(),
      pincode: document.getElementById('m-pincode').value.trim(),
      city: document.getElementById('m-city').value.trim(),
      state: document.getElementById('m-state').value,
      isDefault: document.getElementById('m-default').checked
    };
    if (!payload.name || !payload.phone || !payload.street || !payload.pincode || !payload.city || !payload.state) {
      showToast('Please fill all required fields', 'warning'); return;
    }
    const btn = document.getElementById('save-addr-btn');
    btn.disabled = true; btn.innerHTML = '<div class="spinner spinner-sm"></div>';
    try {
      let data;
      if (editingAddrId) {
        data = await api.put(`/users/address/${editingAddrId}`, payload);
      } else {
        data = await api.post('/users/address', payload);
      }
      userData.addresses = data.addresses;
      renderAddresses(data.addresses);
      showToast('Address saved!', 'success');
      closeAddrModal();
    } catch (err) { showToast(err.message, 'error'); }
    finally { btn.disabled = false; btn.textContent = 'Save Address'; }
  });

  async function deleteAddress(id) {
    if (!confirm('Delete this address?')) return;
    try {
      const data = await api.delete(`/users/address/${id}`);
      userData.addresses = data.addresses;
      renderAddresses(data.addresses);
      showToast('Address deleted', 'info');
    } catch (err) { showToast(err.message, 'error'); }
  }

  function closeAddrModal() { document.getElementById('addr-modal').classList.remove('active'); }
  function scrollToAddresses() { document.getElementById('addresses-section').scrollIntoView({ behavior: 'smooth' }); }

  document.getElementById('logout-btn').addEventListener('click', () => {
    auth.logout();
    showToast('Logged out', 'info');
    setTimeout(() => location.href = 'index.html', 700);
  });

  loadProfile();
</script>
</body>
</html>
