<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Users – Pretty Store Admin</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><span class="brand-icon">💕</span><span class="brand-text">Pretty Store</span></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item"><span>📊</span> Dashboard</a>
      <a href="products.html" class="nav-item"><span>📦</span> Products</a>
      <a href="orders.html" class="nav-item"><span>🛒</span> Orders</a>
      <a href="users.html" class="nav-item active"><span>👥</span> Users</a>
      <a href="settings.html" class="nav-item"><span>⚙️</span> Settings</a>
    </nav>
    <button class="sidebar-logout" id="logout-btn">🚪 Logout</button>
  </aside>
  <main class="admin-main">
    <header class="admin-header">
      <button class="menu-toggle" id="menu-toggle">☰</button>
      <h1 class="page-title">Registered Users</h1>
    </header>
    <div class="admin-content">
      <div class="card">
        <div id="users-container"><div class="flex-center" style="padding:40px"><div class="spinner"></div></div></div>
        <div id="users-pagination" class="pagination"></div>
      </div>
    </div>
  </main>
</div>

<div id="toast-container"></div>
<script src="../assets/js/utils.js"></script>
<script src="admin.js"></script>
<script>
  requireAdminAuth();
  let currentPage = 1;

  async function loadUsers(page = 1) {
    currentPage = page;
    try {
      document.getElementById('users-container').innerHTML = '<div class="flex-center" style="padding:40px"><div class="spinner"></div></div>';
      const data = await adminApi.get(`/admin/users?page=${page}&limit=20`);
      renderUsers(data.users);
      renderPagination(data.pages, page);
    } catch (err) { showToast(err.message, 'error'); }
  }

  function renderUsers(users) {
    if (!users.length) {
      document.getElementById('users-container').innerHTML = '<div class="empty-state"><div class="empty-icon">👥</div><h3>No users registered yet</h3></div>';
      return;
    }
    document.getElementById('users-container').innerHTML = `
      <div class="table-wrap">
        <table class="admin-table">
          <thead><tr>
            <th>#</th><th>Name</th><th>Phone</th><th>Email</th><th>Joined</th><th>Status</th><th>Action</th>
          </tr></thead>
          <tbody>
            ${users.map((u, i) => `<tr>
              <td class="text-muted" style="font-size:12px">${i + 1 + (currentPage - 1) * 20}</td>
              <td>
                <div style="display:flex;align-items:center;gap:10px">
                  <div style="width:36px;height:36px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px;flex-shrink:0">
                    ${(u.name || u.phone)[0].toUpperCase()}
                  </div>
                  <span class="font-bold">${u.name || '<span class="text-muted">—</span>'}</span>
                </div>
              </td>
              <td>${u.phone}</td>
              <td class="text-muted">${u.email || '—'}</td>
              <td style="font-size:12px">${formatDate(u.createdAt)}</td>
              <td><span class="badge ${u.isActive ? 'badge-success' : 'badge-error'}">${u.isActive ? 'Active' : 'Blocked'}</span></td>
              <td>
                <button class="action-btn ${u.isActive ? 'delete' : 'edit'}"
                  onclick="toggleUser('${u._id}', ${!u.isActive})">
                  ${u.isActive ? '🚫 Block' : '✅ Unblock'}
                </button>
              </td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  function renderPagination(pages, current) {
    const el = document.getElementById('users-pagination');
    if (pages <= 1) { el.innerHTML = ''; return; }
    let html = '';
    for (let i = 1; i <= pages; i++) html += `<button class="page-btn ${i===current?'active':''}" onclick="loadUsers(${i})">${i}</button>`;
    el.innerHTML = html;
  }

  async function toggleUser(id, isActive) {
    try {
      await adminApi.put(`/admin/users/${id}/status`, { isActive });
      showToast(isActive ? 'User unblocked' : 'User blocked', 'success');
      loadUsers(currentPage);
    } catch (err) { showToast(err.message, 'error'); }
  }

  loadUsers();
</script>
</body>
</html>
